version: 2

# Routine version-update pull requests are disabled. Phoenix accepts
# Dependabot security alerts and security-update pull requests, while
# planned upgrades are handled in reviewed maintenance releases.
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "security(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
    commit-message:
      prefix: "security(actions)"
      include: "scope"
