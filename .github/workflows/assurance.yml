name: Production Assurance Evidence
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write
jobs:
  evidence:
    name: provenance-and-recovery
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: phoenix
          POSTGRES_PASSWORD: phoenix
          POSTGRES_DB: phoenix
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U phoenix"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PHOENIX_ENV: ci
      PHOENIX_DATABASE_REQUIRED: "true"
      PHOENIX_DATABASE_URL: postgres://phoenix:phoenix@127.0.0.1:5432/phoenix
      PHOENIX_DOCUMENTATION_ENABLED: "false"
      PHOENIX_REQUIRE_TLS: "false"
      PHOENIX_IDENTITY_PASSWORD_BREACH_MODE: disabled
      PHOENIX_IDENTITY_WEBAUTHN_RP_ID: localhost
      PHOENIX_IDENTITY_WEBAUTHN_ORIGINS: http://localhost:3000
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false
      - name: Generate ephemeral assurance secrets
        shell: bash
        run: |
          python - <<'PY'
          import base64, os
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              for name in ['PHOENIX_IDENTITY_TOKEN_PEPPER','PHOENIX_IDENTITY_NOTIFICATION_KEY','PHOENIX_IDENTITY_PRIVACY_KEY','PHOENIX_IDENTITY_MFA_KEY','PHOENIX_OPERATIONS_TOKEN']:
                  f.write(f"{name}={base64.urlsafe_b64encode(os.urandom(32)).decode().rstrip('=')}\n")
          PY
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Repository and security authority
        run: npm run check
      - name: Apply migrations
        run: npm run migrate
      - name: Run tests and build
        run: npm run test:all && npm run build
      - name: Create incident-safe operational snapshot
        run: PHOENIX_INCIDENT_SNAPSHOT_PATH="${{ runner.temp }}/incident-snapshot.json" npm run incident:snapshot
      - name: Database backup and restore drill
        shell: bash
        run: |
          mkdir -p "${{ runner.temp }}/recovery"
          docker run --rm --network host -e PGPASSWORD=phoenix -v "${{ runner.temp }}/recovery:/evidence" postgres:18-alpine pg_dump -h 127.0.0.1 -U phoenix -d phoenix -Fc -f /evidence/phoenix.dump
          sha256sum "${{ runner.temp }}/recovery/phoenix.dump" > "${{ runner.temp }}/recovery/phoenix.dump.sha256"
          docker run --rm --network host -e PGPASSWORD=phoenix postgres:18-alpine dropdb --if-exists -h 127.0.0.1 -U phoenix phoenix_restore
          docker run --rm --network host -e PGPASSWORD=phoenix postgres:18-alpine createdb -h 127.0.0.1 -U phoenix phoenix_restore
          docker run --rm --network host -e PGPASSWORD=phoenix -v "${{ runner.temp }}/recovery:/evidence" postgres:18-alpine pg_restore --exit-on-error -h 127.0.0.1 -U phoenix -d phoenix_restore /evidence/phoenix.dump
          PHOENIX_RECOVERY_DATABASE_URL=postgres://phoenix:phoenix@127.0.0.1:5432/phoenix_restore npm run recovery:verify
          rm -f "${{ runner.temp }}/recovery/phoenix.dump"
      - name: Build release evidence
        shell: bash
        run: |
          EVIDENCE="${{ runner.temp }}/evidence"
          mkdir -p "$EVIDENCE/package"
          cp -R dist migrations package.json package-lock.json Dockerfile "$EVIDENCE/package/"
          tar -C "$EVIDENCE/package" -czf "$EVIDENCE/phoenix-core-${{ github.sha }}.tgz" .
          npm sbom --sbom-format cyclonedx > "$EVIDENCE/phoenix-core-${{ github.sha }}.cdx.json"
          sha256sum "$EVIDENCE/phoenix-core-${{ github.sha }}.tgz" > "$EVIDENCE/SHA256SUMS"
      - name: Attest release provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/evidence/phoenix-core-${{ github.sha }}.tgz
      - name: Attest release SBOM
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/evidence/phoenix-core-${{ github.sha }}.tgz
          sbom-path: ${{ runner.temp }}/evidence/phoenix-core-${{ github.sha }}.cdx.json
      - name: Upload assurance evidence
        uses: actions/upload-artifact@v7
        with:
          name: phoenix-production-assurance-${{ github.sha }}
          path: |
            ${{ runner.temp }}/evidence/*
            ${{ runner.temp }}/incident-snapshot.json
            ${{ runner.temp }}/recovery/phoenix.dump.sha256
            ${{ runner.temp }}/created_attestation_paths.txt
          if-no-files-found: error
          retention-days: 30
      - name: Verify governed repository stayed clean
        run: test -z "$(git status --porcelain --untracked-files=all)"
