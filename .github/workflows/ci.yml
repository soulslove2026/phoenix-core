name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: phoenix
          POSTGRES_PASSWORD: phoenix
          POSTGRES_DB: phoenix
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U phoenix"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PHOENIX_ENV: ci
      PHOENIX_DATABASE_REQUIRED: "true"
      PHOENIX_DATABASE_URL: postgres://phoenix:phoenix@127.0.0.1:5432/phoenix
      PHOENIX_DOCUMENTATION_ENABLED: "false"
      PHOENIX_REQUIRE_TLS: "false"
      PHOENIX_IDENTITY_PASSWORD_BREACH_MODE: disabled
      PHOENIX_IDENTITY_WEBAUTHN_RP_ID: localhost
      PHOENIX_IDENTITY_WEBAUTHN_ORIGINS: http://localhost:3000
      PHOENIX_IDENTITY_TOTP_ISSUER: Phoenix CI
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_PROGRESS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false
      - name: Generate ephemeral CI secrets
        shell: bash
        run: |
          python - <<'PY'
          import base64, os
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              for name in ['PHOENIX_IDENTITY_TOKEN_PEPPER','PHOENIX_IDENTITY_NOTIFICATION_KEY','PHOENIX_IDENTITY_PRIVACY_KEY','PHOENIX_IDENTITY_MFA_KEY']:
                  f.write(f"{name}={base64.urlsafe_b64encode(os.urandom(32)).decode().rstrip('=')}\n")
          PY
      - name: Verify public lockfile registry
        run: |
          ! grep -R "applied-caas-gateway\|internal.api.openai.org" package-lock.json
          grep -q '"https://registry.npmjs.org/' package-lock.json
      - name: Install dependencies
        timeout-minutes: 10
        run: npm ci --ignore-scripts --no-audit --no-fund --loglevel=verbose
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
      - name: Full dependency audit
        run: npm audit --audit-level=high
      - name: Repository constitutional consistency
        run: npm run check:repo
      - name: Generate CycloneDX SBOM outside repository
        shell: bash
        run: |
          SBOM_PATH="${{ runner.temp }}/phoenix-core-sbom.cdx.json"
          npm sbom --sbom-format cyclonedx > "$SBOM_PATH"
          node -e "JSON.parse(require('node:fs').readFileSync(process.argv[1], 'utf8'))" "$SBOM_PATH"
      - name: Upload SBOM evidence
        uses: actions/upload-artifact@v7
        with:
          name: phoenix-core-sbom-${{ github.sha }}
          path: ${{ runner.temp }}/phoenix-core-sbom.cdx.json
          if-no-files-found: error
          retention-days: 30
      - name: Verify repository remained clean after evidence generation
        shell: bash
        run: test -z "$(git status --porcelain --untracked-files=all)"
      - name: Security static checks
        run: npm run security:check
      - name: Strict TypeScript checks
        run: npm run typecheck
      - name: Apply database migrations
        run: npm run migrate
      - name: Verify migration idempotency and checksums
        run: npm run migrate
      - name: Verify Identity migration ledger
        shell: bash
        run: |
          node --input-type=module - <<'NODE'
          import pg from "pg";
          const pool = new pg.Pool({ connectionString: process.env.PHOENIX_DATABASE_URL, max: 1 });
          try {
            const result = await pool.query("select count(*)::int as count from phoenix_schema_migrations");
            if (result.rows[0]?.count !== 4) throw new Error(`expected 4 migrations, found ${result.rows[0]?.count}`);
          } finally {
            await pool.end();
          }
          NODE
      - name: Unit tests
        run: npm test
      - name: PostgreSQL integration tests
        run: npm run test:integration
      - name: Production build
        run: npm run build
      - name: Validate incident-safe snapshot from compiled output
        shell: bash
        run: |
          test -f dist/scripts/security-incident-snapshot.js
          PHOENIX_INCIDENT_SNAPSHOT_PATH="${{ runner.temp }}/incident-snapshot.json" npm run incident:snapshot
          node -e "const r=JSON.parse(require('node:fs').readFileSync(process.argv[1],'utf8')); if(r.schema!=='phoenix.security-incident-snapshot.v1') process.exit(1)" "${{ runner.temp }}/incident-snapshot.json"
      - name: Container build
        run: docker build --progress=plain -t phoenix-core:${{ github.sha }} .
