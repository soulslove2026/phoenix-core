name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 2"
permissions:
  contents: read
  security-events: write
jobs:
  analyze:
    name: analyze-typescript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
