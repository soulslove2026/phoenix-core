name: External Assurance Control Validation
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  evidence-control-tooling:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Repository and security authority
        run: npm run check
      - name: Test and build evidence tooling
        run: npm test && npm run build
      - name: Validate blocked committed templates
        shell: bash
        run: node dist/scripts/external-assurance-evidence.js validate assurance/templates > "${{ runner.temp }}/external-assurance-template-assessment.json"
      - name: Prove no real evidence is committed
        shell: bash
        run: test -z "$(find assurance/evidence -type f ! -name README.md ! -name .gitignore -print -quit)"
      - name: Upload control-validation report
        uses: actions/upload-artifact@v7
        with:
          name: phoenix-external-assurance-control-validation-${{ github.sha }}
          path: ${{ runner.temp }}/external-assurance-template-assessment.json
          if-no-files-found: error
          retention-days: 30
      - name: Verify governed repository stayed clean
        run: test -z "$(git status --porcelain --untracked-files=all)"
