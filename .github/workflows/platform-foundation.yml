name: Platform Foundation

on:
  pull_request:
    paths:
      - "src/platform/**"
      - "migrations/005_platform_foundation.sql"
      - "test/platform-foundation.test.ts"
      - "docs/PLATFORM_FOUNDATION.md"
      - "src/app.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/platform-foundation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  platform-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npx tsx --test test/platform-foundation.test.ts
      - run: npm run build
  integration:
    name: PostgreSQL Integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: phoenix
          POSTGRES_PASSWORD: phoenix
          POSTGRES_DB: phoenix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U phoenix -d phoenix_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://phoenix:phoenix@127.0.0.1:5432/phoenix_test
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
