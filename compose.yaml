services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: phoenix
      POSTGRES_PASSWORD: phoenix
      POSTGRES_DB: phoenix
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoenix"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: ["phoenix_pg:/var/lib/postgresql/data"]

  phoenix-core:
    build: .
    depends_on:
      postgres: { condition: service_healthy }
    environment: &phoenix-env
      PHOENIX_ENV: local-compose
      PHOENIX_HOST: 0.0.0.0
      PHOENIX_PORT: 3000
      PHOENIX_DATABASE_REQUIRED: "true"
      PHOENIX_DATABASE_URL: postgres://phoenix:phoenix@postgres:5432/phoenix
      PHOENIX_IDENTITY_TOKEN_PEPPER: ${PHOENIX_IDENTITY_TOKEN_PEPPER:?required}
      PHOENIX_IDENTITY_NOTIFICATION_KEY: ${PHOENIX_IDENTITY_NOTIFICATION_KEY:?required}
      PHOENIX_IDENTITY_PRIVACY_KEY: ${PHOENIX_IDENTITY_PRIVACY_KEY:?required}
      PHOENIX_IDENTITY_MFA_KEY: ${PHOENIX_IDENTITY_MFA_KEY:?required}
      PHOENIX_IDENTITY_PASSWORD_BREACH_MODE: ${PHOENIX_IDENTITY_PASSWORD_BREACH_MODE:-disabled}
      PHOENIX_IDENTITY_WEBAUTHN_RP_NAME: ${PHOENIX_IDENTITY_WEBAUTHN_RP_NAME:-Phoenix}
      PHOENIX_IDENTITY_WEBAUTHN_RP_ID: ${PHOENIX_IDENTITY_WEBAUTHN_RP_ID:-localhost}
      PHOENIX_IDENTITY_WEBAUTHN_ORIGINS: ${PHOENIX_IDENTITY_WEBAUTHN_ORIGINS:-http://localhost:3000}
      PHOENIX_REQUIRE_TLS: "false"
    command: ["sh", "-c", "node dist/scripts/migrate.js && node dist/src/main.js"]
    ports: ["3000:3000"]
    read_only: true
    init: true
    tmpfs: ["/tmp"]
    cap_drop: ["ALL"]
    pids_limit: 200
    security_opt: ["no-new-privileges:true"]

  notification-worker:
    build: .
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      <<: *phoenix-env
      PHOENIX_NOTIFICATION_PROVIDER_URL: ${PHOENIX_NOTIFICATION_PROVIDER_URL:?required}
      PHOENIX_NOTIFICATION_PROVIDER_TOKEN: ${PHOENIX_NOTIFICATION_PROVIDER_TOKEN:?required}
      PHOENIX_NOTIFICATION_FROM_EMAIL: ${PHOENIX_NOTIFICATION_FROM_EMAIL:?required}
    command: ["sh", "-c", "node dist/scripts/migrate.js && node dist/scripts/notification-worker.js"]
    read_only: true
    init: true
    tmpfs: ["/tmp"]
    cap_drop: ["ALL"]
    pids_limit: 100
    security_opt: ["no-new-privileges:true"]

volumes: { phoenix_pg: {} }
