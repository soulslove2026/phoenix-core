services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: phoenix
      POSTGRES_PASSWORD: phoenix
      POSTGRES_DB: phoenix
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoenix"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: ["phoenix_pg:/var/lib/postgresql/data"]

  phoenix-core:
    build: .
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      PHOENIX_ENV: local-compose
      PHOENIX_HOST: 0.0.0.0
      PHOENIX_PORT: 3000
      PHOENIX_DATABASE_REQUIRED: "true"
      PHOENIX_DATABASE_URL: postgres://phoenix:phoenix@postgres:5432/phoenix
      PHOENIX_IDENTITY_TOKEN_PEPPER: ${PHOENIX_IDENTITY_TOKEN_PEPPER:?required}
      PHOENIX_IDENTITY_NOTIFICATION_KEY: ${PHOENIX_IDENTITY_NOTIFICATION_KEY:?required}
      PHOENIX_IDENTITY_PRIVACY_KEY: ${PHOENIX_IDENTITY_PRIVACY_KEY:?required}
      PHOENIX_REQUIRE_TLS: "false"
      PHOENIX_IDENTITY_SESSION_ABSOLUTE_TTL_SECONDS: 2592000
      PHOENIX_IDENTITY_SESSION_IDLE_TTL_SECONDS: 43200
      PHOENIX_IDENTITY_VERIFICATION_TTL_SECONDS: 86400
      PHOENIX_IDENTITY_PASSWORD_RESET_TTL_SECONDS: 900
      PHOENIX_IDENTITY_RATE_LIMIT_WINDOW_SECONDS: 900
      PHOENIX_IDENTITY_REGISTER_MAX_ATTEMPTS: 5
      PHOENIX_IDENTITY_LOGIN_MAX_ATTEMPTS: 10
      PHOENIX_IDENTITY_ACTION_REQUEST_MAX_ATTEMPTS: 5
      PHOENIX_IDENTITY_ACTION_CONFIRM_MAX_ATTEMPTS: 10
    command: ["sh", "-c", "node dist/scripts/migrate.js && node dist/src/main.js"]
    ports: ["3000:3000"]
    read_only: true
    init: true
    tmpfs: ["/tmp"]
    cap_drop: ["ALL"]
    pids_limit: 200
    security_opt: ["no-new-privileges:true"]

volumes: { phoenix_pg: {} }
